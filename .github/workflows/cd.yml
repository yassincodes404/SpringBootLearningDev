# ==============================================================================
# CD Pipeline — Continuous Deployment
# ==============================================================================
# Triggered when CI passes on main branch.
# ==============================================================================

name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      # ---- Checkout ----
      - name: Checkout code
        uses: actions/checkout@v4

      # ---- Docker Build ----
      - name: Build Docker image
        working-directory: backend
        run: |
          docker build -t myproject-backend:${{ github.sha }} .
          docker tag myproject-backend:${{ github.sha }} myproject-backend:latest

