# ==============================================================================
# Production Profile
# ==============================================================================

spring:
  # ---- Database ----
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

# ---- Logging ----
logging:
  level:
    com.example.project: INFO
    org.springframework: WARN
