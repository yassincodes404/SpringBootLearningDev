# ==============================================================================
# Test Profile
# ==============================================================================

spring:
  # ---- In-memory database for tests ----
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:myproject_test}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}

  jpa:
    hibernate:
      ddl-auto: create-drop

  # ---- Disable Flyway for tests (Hibernate manages schema) ----
  flyway:
    enabled: false

# ---- Logging ----
logging:
  level:
    com.example.project: DEBUG
