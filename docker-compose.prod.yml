# ==============================================================================
# Docker Compose — Production Environment
# ==============================================================================
# Start:  docker compose -f docker-compose.prod.yml up -d --build
# Stop:   docker compose -f docker-compose.prod.yml down
# ==============================================================================

services:

  # ---- NGINX Reverse Proxy ----
  nginx:
    image: nginx:alpine
    container_name: myproject-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started

  # ---- Backend (Spring Boot) ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: myproject-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-myproject}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-password}
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---- Frontend (React served by NGINX) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: myproject-frontend
    restart: unless-stopped
    ports:
      - "3000:80"

  # ---- PostgreSQL ----
  postgres:
    image: postgres:16-alpine
    container_name: myproject-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-myproject}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: myproject-redis-prod
    restart: unless-stopped
    volumes:
      - redis-prod-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-prod-data:
  redis-prod-data:
